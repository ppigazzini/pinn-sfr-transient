# Run `uv run pre-commit install --install-hooks` once. Fast checks (ruff) run on
# every commit; slower checks (ty, pytest) run on push. All tools execute through
# `uv run`, so their versions come from uv.lock (the single source of truth)
# rather than a separately pinned hook mirror.
default_install_hook_types: [pre-commit, pre-push]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: nbstripout
        name: nbstripout
        # Strip outputs AND Colab cell metadata that leaks personal identity
        # (executionInfo.user, outputId, per-cell colab/base_uri) and bloats diffs.
        entry: uv run nbstripout --extra-keys
          "cell.metadata.executionInfo cell.metadata.outputId cell.metadata.colab cell.metadata.id"
        language: system
        files: \.ipynb$

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
